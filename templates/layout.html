<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ this.title }}{% endblock %}</title>

  <!-- Fonts: Source Serif 4 + Source Sans 3 + Fira Code -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,700;1,8..60,400&family=Source+Sans+3:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

  <!-- Site stylesheet -->
  <link rel="stylesheet" href="{{ '/static/css/style.css' | url }}">
</head>
<body>

  <header class="site-header">
    <nav>
      <a href="{{ '/' | url }}" class="site-name">Thabang Keele</a>
      <ul class="nav-links">
        <li><a href="{{ '/blog/' | url }}">Blog</a></li>
        <li><a href="{{ '/projects/' | url }}">Projects</a></li>
        <li><a href="{{ '/books/' | url }}">Reading</a></li>
        <li><a href="{{ '/movies/' | url }}">Movies</a></li>
        <li><a href="{{ '/about/' | url }}">About</a></li>
      </ul>
    </nav>
  </header>

  {% block body %}{% endblock %}

  <footer class="site-footer">
    <span>&copy; Copyright 2026 by Thabang Keele.<br>
      Unless otherwise noted, all content is generated by a human.
    </span>
    <span>
      <a href="https://www.linkedin.com/in/thabang-keele/">LinkedIn</a>
       ·
       <a href="https://github.com/thabangkeele">GitHub</a>
    </span>
  </footer>

  <!-- KaTeX auto-render -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ]
    });">
  </script>

</body>
</html>
